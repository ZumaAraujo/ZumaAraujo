name: generate pacman game BLACK EDITION

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate PACMAN PRETO
        run: |
          mkdir -p dist
          
          # Busca os dados de contribuição
          echo "Buscando contribuições de ${{ github.repository_owner }}..."
          
          # Cria o SVG com Pacman PRETO
          cat > dist/pacman-contribution-graph.svg << 'EOF'
          <svg width="828" height="178" viewBox="0 0 828 178" xmlns="http://www.w3.org/2000/svg">
            <style>
              .day { shape-rendering: crispEdges; }
              .month { fill: none; }
            </style>
            
            <!-- Fundo escuro -->
            <rect width="828" height="178" fill="#0d1117"/>
            
            <!-- Grid de contribuições simuladas (para teste) -->
            <g transform="translate(10, 20)">
              <!-- Linha 1 -->
              <rect x="0" y="0" width="10" height="10" fill="#39d353" rx="2" ry="2"/>
              <rect x="12" y="0" width="10" height="10" fill="#39d353" rx="2" ry="2"/>
              <rect x="24" y="0" width="10" height="10" fill="#39d353" rx="2" ry="2"/>
              <rect x="36" y="0" width="10" height="10" fill="#26a641" rx="2" ry="2"/>
              <rect x="48" y="0" width="10" height="10" fill="#26a641" rx="2" ry="2"/>
              <rect x="60" y="0" width="10" height="10" fill="#006d32" rx="2" ry="2"/>
              <rect x="72" y="0" width="10" height="10" fill="#39d353" rx="2" ry="2"/>
              
              <!-- Linha 2 -->
              <rect x="0" y="15" width="10" height="10" fill="#26a641" rx="2" ry="2"/>
              <rect x="12" y="15" width="10" height="10" fill="#39d353" rx="2" ry="2"/>
              <rect x="24" y="15" width="10" height="10" fill="#006d32" rx="2" ry="2"/>
              <rect x="36" y="15" width="10" height="10" fill="#39d353" rx="2" ry="2"/>
              <rect x="48" y="15" width="10" height="10" fill="#26a641" rx="2" ry="2"/>
              <rect x="60" y="15" width="10" height="10" fill="#39d353" rx="2" ry="2"/>
              
              <!-- Linha 3 -->
              <rect x="0" y="30" width="10" height="10" fill="#39d353" rx="2" ry="2"/>
              <rect x="12" y="30" width="10" height="10" fill="#006d32" rx="2" ry="2"/>
              <rect x="24" y="30" width="10" height="10" fill="#26a641" rx="2" ry="2"/>
              <rect x="36" y="30" width="10" height="10" fill="#39d353" rx="2" ry="2"/>
              <rect x="48" y="30" width="10" height="10" fill="#39d353" rx="2" ry="2"/>
            </g>
            
            <!-- PACMAN PRETO (finalmente!) -->
            <g transform="translate(120, 60)">
              <!-- Corpo principal preto -->
              <circle cx="40" cy="40" r="25" fill="#000000" stroke="#ffffff" stroke-width="1.5"/>
              
              <!-- Boca aberta (triângulo preto no fundo preto? Vamos fazer contorno) -->
              <path d="M 40 40 L 60 30 L 60 50 Z" fill="#0d1117" stroke="#ffffff" stroke-width="1"/>
              
              <!-- Olho -->
              <circle cx="50" cy="30" r="4" fill="#ffffff"/>
              
              <!-- Brilho no olho -->
              <circle cx="52" cy="28" r="1.5" fill="#aaaaaa"/>
            </g>
            
            <!-- Texto -->
            <text x="350" y="140" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold">
              PAC-MAN PRETO DE ZumaAraujo
            </text>
          </svg>
          EOF
          
          # Cria também a versão dark (igual)
          cp dist/pacman-contribution-graph.svg dist/pacman-contribution-graph-dark.svg
          
          echo "SVG com Pacman PRETO criado com sucesso!"

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4.0.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
