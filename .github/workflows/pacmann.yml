name: Generate Pac-Man Game

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Generate SVG with black Pacman
        run: |
          mkdir -p dist
          curl -s "https://github.com/${{ github.repository_owner }}.png?size=60" > /dev/null
          
          # Busca os dados de contribuição
          CONTRIBUTIONS=$(curl -s "https://github.com/users/${{ github.repository_owner }}/contributions")
          
          # Cria um SVG personalizado com Pacman PRETO
          echo '<svg width="828" height="178" viewBox="0 0 828 178" xmlns="http://www.w3.org/2000/svg">' > dist/pacman-contribution-graph.svg
          echo '<style>.month { fill: none; } .day { shape-rendering: crispEdges; }</style>' >> dist/pacman-contribution-graph.svg
          
          # Adiciona fundo preto
          echo '<rect width="828" height="178" fill="#0d1117"/>' >> dist/pacman-contribution-graph.svg
          
          # Aqui criamos um PACMAN PRETO personalizado
          echo '<g transform="translate(50, 80)">' >> dist/pacman-contribution-graph.svg
          echo '  <!-- Pacman PRETO -->' >> dist/pacman-contribution-graph.svg
          echo '  <circle cx="30" cy="30" r="25" fill="#000000" stroke="#ffffff" stroke-width="1"/>' >> dist/pacman-contribution-graph.svg
          echo '  <path d="M 30 30 L 45 20 L 45 40 Z" fill="#0d1117" stroke="#ffffff" stroke-width="0.5"/>' >> dist/pacman-contribution-graph.svg
          echo '  <!-- Olho -->' >> dist/pacman-contribution-graph.svg
          echo '  <circle cx="40" cy="20" r="3" fill="#ffffff"/>' >> dist/pacman-contribution-graph.svg
          echo '</g>' >> dist/pacman-contribution-graph.svg
          
          # Adiciona texto explicativo
          echo '<text x="400" y="140" fill="#ffffff" font-family="Arial" font-size="12">Contribuições com Pacman Preto</text>' >> dist/pacman-contribution-graph.svg
          echo '</svg>' >> dist/pacman-contribution-graph.svg
          
          # Copia pro dark também
          cp dist/pacman-contribution-graph.svg dist/pacman-contribution-graph-dark.svg
      
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
